# Tên workflow hiển thị trong tab Actions của GitHub
name: Build and Push Docker Image

# Khi có code được push lên branch master thì workflow sẽ chạy
on:
  push:
    branches:
      - master

jobs:
  # Tạo một job tên là docker
  docker:

    # Chạy trên máy Ubuntu do GitHub cung cấp
    runs-on: ubuntu-latest

    steps:

      # Bước 1: Lấy source code từ GitHub Repository
      - name: Checkout source
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập Docker Hub
      # Username và Password được lấy từ GitHub Secrets
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Tên workflow hiển thị trong tab Actions của GitHub
name: Build and Push Docker Image

# Khi có code được push lên branch master thì workflow sẽ chạy
on:
  push:
    branches:
      - master

jobs:
  # Tạo một job tên là docker
  docker:

    # Chạy trên máy Ubuntu do GitHub cung cấp
    runs-on: ubuntu-latest

    steps:

      # Bước 1: Lấy source code từ GitHub Repository
      - name: Checkout source
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập Docker Hub
      # Username và Password được lấy từ GitHub Secrets
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 3: Build Docker Image từ Dockerfile
      # Tag image là phat997/devopsdemo:latest
      - name: Build image
        run: docker build -t phat997/devopsdemo:latest .

      # Bước 4: Push Docker Image lên Docker Hub
      - name: Push image
        run: docker push phat997/devopsdemo:latest